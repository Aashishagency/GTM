<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — GTM Workflow</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
  body { background:linear-gradient(135deg,#1a1f36,#2d3454); min-height:100vh; display:flex;
         align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; }
  .login-card { background:#fff; border-radius:16px; box-shadow:0 12px 40px rgba(0,0,0,.3);
                padding:40px; width:380px; max-width:92vw; text-align:center; }
  .brand { font-weight:700; font-size:1.4rem; color:#1a1f36; margin-bottom:4px; }
  .brand span { color:#6c87f5; }
  .gbtn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%;
          padding:11px; border:1px solid #dadce0; border-radius:8px; background:#fff;
          color:#3c4043; font-weight:600; font-size:.95rem; text-decoration:none; transition:.15s; }
  .gbtn:hover { box-shadow:0 1px 4px rgba(0,0,0,.18); background:#f8f9ff; color:#3c4043; }
  .gicon { width:18px; height:18px; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="brand">GTM <span>Workflow</span></div>
    <p class="text-muted small mb-4">Aashish Agency — B2B India lead-gen</p>

    {% if error %}
    <div class="alert alert-danger py-2 small text-start">{{ error }}</div>
    {% endif %}

    {% if password %}
    <form method="POST" action="/login?next={{ next|urlencode }}">
      <input type="password" name="password" class="form-control mb-2" placeholder="Password" autofocus required>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
    {% endif %}

    {% if google %}
      {% if password %}<div class="text-muted my-3" style="font-size:.8rem">or</div>{% endif %}
      <a class="gbtn" href="/auth/google">
        <img class="gicon" src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">
        Sign in with Google
      </a>
      <p class="text-muted mt-4 mb-0" style="font-size:.78rem">
        <i class="bi bi-shield-lock me-1"></i>
        Google access is restricted to <strong>{{ allowed }}</strong>.
      </p>
    {% endif %}
  </div>
</body>
</html>
