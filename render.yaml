# Render.com deployment blueprint for the GTM Workflow app.
# In Render: New → Blueprint → connect this repo. It creates the web service + a
# free Postgres DB and wires DATABASE_URL automatically. Fill the `sync: false`
# secrets (API keys, SMTP password, login) in the Render dashboard.
services:
  - type: web
    name: aashish-gtm
    runtime: python
    rootDir: gtm_workflow
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 8 --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: RUN_SCHEDULER          # start the background scheduler under gunicorn
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DATA_PROVIDER
        value: hunter               # change to "apollo" to default to Apollo
      - key: DATABASE_URL           # durable Postgres (auto-wired from the DB below)
        fromDatabase:
          name: gtm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: info@aashishagency.com
      - key: FROM_NAME
        value: Aashish Agency
      - key: IMAP_HOST
        value: imap.gmail.com
      - key: IMAP_PORT
        value: "993"
      # ════════ SET THESE IN THE RENDER DASHBOARD (Environment tab) ════════
      # REQUIRED — the login password (share it only with info@ and sujit@):
      - key: APP_PASSWORD
        sync: false
      # For finding leads:
      - key: HUNTER_API_KEY
        sync: false
      - key: APOLLO_API_KEY
        sync: false
      # For sending campaigns — Google App Password for info@aashishagency.com:
      - key: SMTP_PASS
        sync: false
      # ── OPTIONAL ──
      # Want "Sign in with Google" instead of the password? Set these two and the
      # app switches to Google login automatically (allowlist below). Otherwise leave blank.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ALLOWED_GOOGLE_EMAILS
        value: info@aashishagency.com,sujit@aashishagency.com
      # Only needed to reveal Apollo mobile numbers (the async webhook). Set to your
      # https://<service>.onrender.com URL. Everything else auto-detects the URL.
      - key: APP_BASE_URL
        sync: false

databases:
  - name: gtm-db
    plan: free
    databaseName: gtm
    user: gtm
